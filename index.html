<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collexions Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            plex: {
              orange: '#e5a00d',
              dark: '#1f2937',
              darker: '#111827',
              light: '#374151'
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0f172a;
      /* slate-950 */
      color: #f1f5f9;
      /* slate-100 */
    }

    /* Custom scrollbar globally */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(229, 160, 13, 0.3);
      /* Plex orange transparent */
      border-radius: 20px;
      transition: all 0.3s;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(229, 160, 13, 0.8);
      /* Plex orange more solid */
    }

    /* Firefox */
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(229, 160, 13, 0.4) transparent;
    }

    /* Utility class for containers that should always show scroll styling */
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(229, 160, 13, 0.5);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
